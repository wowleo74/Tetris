<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>레오의 테트리스 - 프로 버전</title>
    <style>
        body {
            background: #121212;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }

        .score-board {
            width: 100%;
            text-align: center;
            padding: 10px 0;
            font-size: 16px;
            color: #00ffcc;
            background: rgba(0, 0, 0, 0.8);
            position: fixed;
            top: 0;
            z-index: 10;
        }

        .game-container {
            position: relative;
            margin-top: 50px;
            margin-bottom: 90px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: calc(100vh - 150px);
        }

        canvas {
            border: 2px solid #444;
            background: #000;
            height: 100%;
            aspect-ratio: 1 / 2;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        /* 시작 및 게임오버 화면 레이어 */
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 30;
            gap: 20px;
        }

        .status-text {
            font-size: 32px;
            font-weight: bold;
            color: #00ffcc;
            text-shadow: 0 0 10px #00ffcc;
        }

        .score-text {
            font-size: 18px;
            color: #fff;
        }

        .start-btn {
            padding: 12px 30px;
            font-size: 20px;
            font-weight: bold;
            background: #00ffcc;
            color: #000;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px #00a887;
        }

        .start-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px #00a887;
        }

        #level-up-msg {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 32px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 10px #ff4757;
            display: none;
            z-index: 20;
        }

        .controls {
            position: fixed;
            bottom: 15px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 10px 0;
        }

        .btn {
            width: 55px;
            height: 55px;
            background: rgba(68, 68, 68, 0.8);
            border-radius: 50%;
            border: 1px solid #555;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:active {
            background: #00ffcc;
            color: #000;
            transform: scale(0.9);
        }

        .btn-rotate {
            background: rgba(255, 71, 87, 0.8);
            border-color: #ff4757;
        }

        .btn-space {
            width: 85px;
            height: 55px;
            border-radius: 20px;
            font-size: 13px;
            background: #2f3542;
        }
    </style>
</head>

<body>

    <div class="score-board">SCORE: <span id="score">0</span> | LV: <span id="level">1</span> | LINES: <span
            id="lines">0</span></div>

    <div class="game-container">
        <canvas id="tetris" width="200" height="400"></canvas>

        <div id="overlay">
            <div id="status-display" class="status-text">READY?</div>
            <div id="final-score-display" class="score-text" style="display:none;">Score: <span
                    id="final-score">0</span></div>
            <button class="start-btn" onclick="startGame()">START GAME</button>
        </div>

        <div id="level-up-msg">LEVEL UP!</div>
    </div>

    <div class="controls">
        <div class="btn" onclick="playerMove(-1)">◀</div>
        <div class="btn" onclick="playerDrop()">▼</div>
        <div class="btn btn-rotate" onclick="playerRotate(1)">↻</div>
        <div class="btn" onclick="playerMove(1)">▶</div>
        <div class="btn btn-space" onclick="playerHardDrop()">HARD<br>DROP</div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playNote(freq, type, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        context.scale(20, 20);

        const colors = [null, '#FF0D72', '#0DC2FF', '#0DFF72', '#F538FF', '#FF8E0D', '#FFE138', '#3877FF'];
        let sweepAnim = [];
        let gameRunning = false;

        function startGame() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            document.getElementById('overlay').style.display = 'none';
            arena.forEach(row => row.fill(0));
            player.score = 0; player.level = 1; player.lines = 0; dropInterval = 1000;
            updateScore();
            playerReset();
            gameRunning = true;
            playNote(440, 'sine', 0.2);
        }

        function createPiece(type) {
            if (type === 'I') return [[0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0]];
            if (type === 'L') return [[0, 2, 0], [0, 2, 0], [0, 2, 2]];
            if (type === 'J') return [[0, 3, 0], [0, 3, 0], [3, 3, 0]];
            if (type === 'O') return [[4, 4], [4, 4]];
            if (type === 'Z') return [[5, 5, 0], [0, 5, 5], [0, 0, 0]];
            if (type === 'S') return [[0, 6, 6], [6, 6, 0], [0, 0, 0]];
            if (type === 'T') return [[0, 7, 0], [7, 7, 7], [0, 0, 0]];
        }

        function createMatrix(w, h) {
            const matrix = [];
            while (h--) { matrix.push(new Array(w).fill(0)); }
            return matrix;
        }

        // 가이드라인(고스트) 계산 및 그리기
        function drawGhost() {
            if (!player.matrix) return;
            const ghostPos = { x: player.pos.x, y: player.pos.y };
            while (!collide(arena, { pos: ghostPos, matrix: player.matrix })) {
                ghostPos.y++;
            }
            ghostPos.y--; // 충돌 직전 위치

            // 흐릿한 흰색 테두리로 그리기
            context.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            context.lineWidth = 0.1;
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        context.strokeRect(x + ghostPos.x, y + ghostPos.y, 1, 1);
                    }
                });
            });
        }

        function draw() {
            context.fillStyle = '#000';
            context.fillRect(0, 0, canvas.width, canvas.height);
            drawMatrix(arena, { x: 0, y: 0 });
            if (gameRunning) drawGhost(); // 가이드라인 그리기
            if (player.matrix) drawMatrix(player.matrix, player.pos);
            sweepAnim.forEach(y => { context.fillStyle = '#fff'; context.fillRect(0, y, arena[0].length, 1); });
        }

        function drawMatrix(matrix, offset) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        context.fillStyle = colors[value];
                        context.fillRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }

        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) return true;
                }
            }
            return false;
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) arena[y + player.pos.y][x + player.pos.x] = value;
                });
            });
            playNote(150, 'triangle', 0.1);
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) { [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]]; }
            }
            if (dir > 0) matrix.forEach(row => row.reverse());
            else matrix.reverse();
        }

        function playerDrop() {
            if (!gameRunning) return;
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
            }
            dropCounter = 0;
        }

        function playerHardDrop() {
            if (!gameRunning) return;
            while (!collide(arena, player)) { player.pos.y++; }
            player.pos.y--;
            merge(arena, player);
            playerReset();
            arenaSweep();
            playNote(100, 'square', 0.2);
        }

        function playerMove(dir) {
            if (!gameRunning) return;
            player.pos.x += dir;
            if (collide(arena, player)) player.pos.x -= dir;
            else playNote(300, 'sine', 0.05);
        }

        function playerRotate(dir) {
            if (!gameRunning) return;
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
            playNote(600, 'sine', 0.1);
        }

        function arenaSweep() {
            let rowsToClear = [];
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) { if (arena[y][x] === 0) continue outer; }
                rowsToClear.push(y);
            }
            if (rowsToClear.length > 0) {
                sweepAnim = rowsToClear;
                playNote(800, 'square', 0.3);
                setTimeout(() => {
                    rowsToClear.forEach(y => {
                        const row = arena.splice(y, 1)[0].fill(0);
                        arena.unshift(row);
                    });
                    player.score += rowsToClear.length * 10;
                    player.lines += rowsToClear.length;
                    sweepAnim = [];
                    if (player.lines >= 10) {
                        player.level++;
                        player.lines -= 10;
                        dropInterval *= 0.95;
                        document.getElementById('level-up-msg').style.display = 'block';
                        playNote(1200, 'sine', 0.5);
                        setTimeout(() => { document.getElementById('level-up-msg').style.display = 'none'; }, 1000);
                    }
                    updateScore();
                }, 150);
            }
        }

        function playerReset() {
            const pieces = 'ILJOTSZ';
            player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);

            if (collide(arena, player)) {
                gameRunning = false;
                document.getElementById('status-display').innerText = "GAME OVER";
                document.getElementById('status-display').style.color = "#ff4757";
                document.getElementById('final-score').innerText = player.score;
                document.getElementById('final-score-display').style.display = "block";
                document.querySelector('.start-btn').innerText = "RESTART";
                document.getElementById('overlay').style.display = 'flex';
                playNote(50, 'square', 0.5);
            }
        }

        function updateScore() {
            document.getElementById('score').innerText = player.score;
            document.getElementById('level').innerText = player.level;
            document.getElementById('lines').innerText = player.lines;
        }

        const arena = createMatrix(10, 20);
        const player = { pos: { x: 0, y: 0 }, matrix: null, score: 0, level: 1, lines: 0 };
        let dropCounter = 0, dropInterval = 1000, lastTime = 0;

        function update(time = 0) {
            const deltaTime = time - lastTime;
            lastTime = time;
            if (gameRunning) {
                dropCounter += deltaTime;
                if (dropCounter > dropInterval) playerDrop();
            }
            draw();
            requestAnimationFrame(update);
        }
        update(); // 루프 시작
    </script>
</body>

</html>
