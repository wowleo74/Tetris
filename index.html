<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>레오의 사운드 테트리스</title>
    <link rel="manifest" href="manifest.json">
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
    <style>
        body {
            background: #1a1a1a;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }

        .score-board {
            width: 100%;
            text-align: center;
            padding: 10px 0;
            font-size: 18px;
            color: #00ffcc;
            background: rgba(0, 0, 0, 0.8);
            position: fixed;
            top: 0;
            z-index: 10;
        }

        .game-container {
            margin-top: 60px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        canvas {
            border: 2px solid #555;
            background: #000;
            max-width: 80vw;
            height: 45vh;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 30;
        }

        .start-btn {
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
            background: #00ffcc;
            color: #00;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 5px #00a887;
        }

        #level-up-msg {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 40px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 10px #ff4757;
            display: none;
            z-index: 20;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(2, 60px);
            gap: 12px;
            margin-top: 20px;
        }

        .btn {
            width: 60px;
            height: 60px;
            background: #444;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
            color: white;
            user-select: none;
            box-shadow: 0 4px #222;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 #222;
            background: #666;
        }

        .btn-rotate {
            background: #ff4757;
            grid-column: 2;
        }

        .btn-down {
            grid-column: 2;
        }

        .btn-space {
            width: 140px;
            height: 45px;
            border-radius: 25px;
            grid-column: 1 / span 3;
            margin: 10px auto 0 auto;
            background: #2f3542;
            font-size: 16px;
            box-shadow: 0 4px #111;
        }
    </style>
</head>

<body>

    <div class="score-board">SCORE: <span id="score">0</span> | LV: <span id="level">1</span> | LINES: <span
            id="lines">0</span></div>

    <div class="game-container">
        <canvas id="tetris" width="240" height="400"></canvas>
        <div id="overlay"><button class="start-btn" onclick="startGame()">START GAME</button></div>
        <div id="level-up-msg">LEVEL UP!</div>
    </div>

    <div class="controls">
        <div class="btn" onclick="playerMove(-1)">◀</div>
        <div class="btn btn-rotate" onclick="playerRotate(1)">↻</div>
        <div class="btn" onclick="playerMove(1)">▶</div>
        <div></div>
        <div class="btn" onclick="playerDrop()">▼</div>
        <div></div>
        <div class="btn btn-space" onclick="playerHardDrop()">HARD DROP</div>
    </div>

    <script>
        // --- [내용물] 마법의 소리 생성기 ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playNote(freq, type, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type; // square(고전게임느낌), triangle, sine
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        context.scale(20, 20);

        const colors = [null, '#FF0D72', '#0DC2FF', '#0DFF72', '#F538FF', '#FF8E0D', '#FFE138', '#3877FF'];
        let sweepAnim = [];
        let gameRunning = false;

        function startGame() {
            if (audioCtx.state === 'suspended') audioCtx.resume(); // 사운드 활성화
            document.getElementById('overlay').style.display = 'none';
            gameRunning = true;
            playerReset();
            updateScore();
            if (!animationStarted) { update(); animationStarted = true; }
            playNote(440, 'sine', 0.2); // 시작 띠링~
        }

        // 테트리스 로직들
        function createPiece(type) {
            if (type === 'I') return [[0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0]];
            if (type === 'L') return [[0, 2, 0], [0, 2, 0], [0, 2, 2]];
            if (type === 'J') return [[0, 3, 0], [0, 3, 0], [3, 3, 0]];
            if (type === 'O') return [[4, 4], [4, 4]];
            if (type === 'Z') return [[5, 5, 0], [0, 5, 5], [0, 0, 0]];
            if (type === 'S') return [[0, 6, 6], [6, 6, 0], [0, 0, 0]];
            if (type === 'T') return [[0, 7, 0], [7, 7, 7], [0, 0, 0]];
        }

        function createMatrix(w, h) {
            const matrix = [];
            while (h--) { matrix.push(new Array(w).fill(0)); }
            return matrix;
        }

        function draw() {
            context.fillStyle = '#000';
            context.fillRect(0, 0, canvas.width, canvas.height);
            drawMatrix(arena, { x: 0, y: 0 });
            if (player.matrix) drawMatrix(player.matrix, player.pos);
            sweepAnim.forEach(y => { context.fillStyle = '#fff'; context.fillRect(0, y, arena[0].length, 1); });
        }

        function drawMatrix(matrix, offset) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        context.fillStyle = colors[value];
                        context.fillRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }

        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) return true;
                }
            }
            return false;
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) arena[y + player.pos.y][x + player.pos.x] = value;
                });
            });
            playNote(150, 'triangle', 0.1); // 툭 떨어지는 소리
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
                }
            }
            if (dir > 0) matrix.forEach(row => row.reverse());
            else matrix.reverse();
        }

        function playerDrop() {
            if (!gameRunning) return;
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
            }
            dropCounter = 0;
        }

        function playerHardDrop() {
            if (!gameRunning) return;
            while (!collide(arena, player)) { player.pos.y++; }
            player.pos.y--;
            merge(arena, player);
            playerReset();
            arenaSweep();
            playNote(100, 'square', 0.2); // 쾅!
        }

        function playerMove(dir) {
            if (!gameRunning) return;
            player.pos.x += dir;
            if (collide(arena, player)) player.pos.x -= dir;
            else playNote(300, 'sine', 0.05); // 옆으로 틱틱
        }

        function playerRotate(dir) {
            if (!gameRunning) return;
            rotate(player.matrix, dir);
            if (collide(arena, player)) rotate(player.matrix, -dir);
            else playNote(600, 'sine', 0.1); // 뾱!
        }

        function arenaSweep() {
            let rowsToClear = [];
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) { if (arena[y][x] === 0) continue outer; }
                rowsToClear.push(y);
            }
            if (rowsToClear.length > 0) {
                sweepAnim = rowsToClear;
                playNote(800, 'square', 0.3); // 팡! 소리
                setTimeout(() => {
                    rowsToClear.forEach(y => {
                        const row = arena.splice(y, 1)[0].fill(0);
                        arena.unshift(row);
                    });
                    player.score += rowsToClear.length * 10;
                    player.lines += rowsToClear.length;
                    sweepAnim = [];
                    if (player.lines >= 10) {
                        player.level++;
                        player.lines -= 10;
                        dropInterval *= 0.95;
                        document.getElementById('level-up-msg').style.display = 'block';
                        playNote(1200, 'sine', 0.5); // 레벨업 빰빰!
                        setTimeout(() => { document.getElementById('level-up-msg').style.display = 'none'; }, 1000);
                    }
                    updateScore();
                }, 150);
            }
        }

        function playerReset() {
            const pieces = 'ILJOTSZ';
            player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            if (collide(arena, player)) {
                gameRunning = false;
                document.getElementById('overlay').style.display = 'flex';
                playNote(50, 'square', 0.5); // 패배 소리
                arena.forEach(row => row.fill(0));
                player.score = 0; player.level = 1; player.lines = 0; dropInterval = 1000;
                updateScore();
            }
        }

        function updateScore() {
            document.getElementById('score').innerText = player.score;
            document.getElementById('level').innerText = player.level;
            document.getElementById('lines').innerText = player.lines;
        }

        const arena = createMatrix(12, 20);
        const player = { pos: { x: 0, y: 0 }, matrix: null, score: 0, level: 1, lines: 0 };
        let dropCounter = 0, dropInterval = 1000, lastTime = 0, animationStarted = false;

        function update(time = 0) {
            const deltaTime = time - lastTime;
            lastTime = time;
            if (gameRunning) {
                dropCounter += deltaTime;
                if (dropCounter > dropInterval) playerDrop();
            }
            draw();
            requestAnimationFrame(update);
        }
        draw(); 
    </script>
</body>

</html>
