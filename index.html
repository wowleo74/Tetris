<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>레오의 딸들을 위한 테트리스 - 프로</title>
    <style>
        :root {
            --bg-color: #2c3e50;
            --panel-color: rgba(255, 255, 255, 0.1);
        }

        body {
            background: var(--bg-color);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 0;
            font-family: 'Apple SD Gothic Neo', sans-serif;
            height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* 상단 UI: 3분할 레이아웃 */
        .header {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            width: 95%;
            max-width: 340px;
            padding: 10px 0;
            z-index: 10;
            gap: 5px;
        }

        .info-box {
            background: var(--panel-color);
            padding: 5px;
            border-radius: 12px;
            font-size: 13px;
            text-align: center;
        }

        .info-label {
            font-size: 10px;
            color: #bdc3c7;
            display: block;
            margin-bottom: 2px;
        }

        /* 미리보기 박스 스타일 */
        .next-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* [핵심 수정] 미리보기 캔버스 크기 최적화 (짤림 방지) */
        canvas#next {
            width: 50px;
            height: 50px;
        }

        /* 게임 메인 컨테이너 */
        .game-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        canvas#tetris {
            border: 4px solid #fff;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.5);
            height: 60vh;
            aspect-ratio: 1 / 2;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        /* 오버레이 화면 */
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(44, 62, 80, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            border-radius: 10px;
        }

        .btn-start {
            padding: 12px 30px;
            font-size: 20px;
            font-weight: bold;
            background: #ff7675;
            color: #fff;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px #d63031;
        }

        .btn-start:active {
            transform: translateY(3px);
            box-shadow: 0 1px #d63031;
        }

        /* 조작 버튼 */
        .controls {
            display: flex;
            gap: 10px;
            padding: 15px 0;
        }

        .btn {
            width: 55px;
            height: 55px;
            background: #fab1a0;
            border-radius: 50%;
            border: none;
            font-size: 22px;
            color: #fff;
            box-shadow: 0 4px #e17055;
        }

        .btn:active {
            transform: scale(0.9);
            box-shadow: 0 1px #e17055;
        }

        .btn-hard {
            width: 85px;
            border-radius: 18px;
            background: #74b9ff;
            box-shadow: 0 4px #0984e3;
            font-size: 12px;
        }
    </style>
</head>

<body>

    <div class="header">
        <div class="info-box"><span class="info-label">SCORE</span><span id="score">0</span></div>
        <div class="info-box next-box">
            <span class="info-label">NEXT</span>
            <canvas id="next" width="80" height="80"></canvas>
        </div>
        <div class="info-box"><span class="info-label">LEVEL</span><span id="level">1</span></div>
    </div>

    <div class="game-wrapper">
        <canvas id="tetris" width="200" height="400"></canvas>

        <div id="overlay">
            <h1 id="msg" style="margin-bottom: 5px; font-size: 28px;">READY?</h1>
            <p id="final-score-txt" style="display:none; margin-bottom: 15px; font-size: 16px;">Score: <span
                    id="final-score">0</span></p>
            <button class="btn-start" onclick="startGame()">START!</button>
        </div>
    </div>

    <div class="controls">
        <button class="btn" onclick="playerMove(-1)">◀</button>
        <button class="btn" onclick="playerDrop()">▼</button>
        <button class="btn" onclick="playerRotate(1)">↻</button>
        <button class="btn" onclick="playerMove(1)">▶</button>
        <button class="btn btn-hard" onclick="playerHardDrop()">BOMB!<br>DROP</button>
    </div>

    <script>
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const nextCanvas = document.getElementById('next');
        const nextContext = nextCanvas.getContext('2d');

        context.scale(20, 20);
        // [핵심 수정] 미리보기 스케일 최적화 (짤림 방지)
        nextContext.scale(20, 20);

        // 귀여운 파스텔 컬러 (8번은 폭탄)
        const colors = [null, '#ff7675', '#74b9ff', '#55efc4', '#ffe138', '#fab1a0', '#a29bfe', '#fd79a8', '#2d3436'];

        function createPiece(type) {
            if (type === 'I') return [[0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0]];
            if (type === 'L') return [[0, 2, 0], [0, 2, 0], [0, 2, 2]];
            if (type === 'J') return [[0, 3, 0], [0, 3, 0], [3, 3, 0]];
            if (type === 'O') return [[4, 4], [4, 4]];
            if (type === 'Z') return [[5, 5, 0], [0, 5, 5], [0, 0, 0]];
            if (type === 'S') return [[0, 6, 6], [6, 6, 0], [0, 0, 0]];
            if (type === 'T') return [[0, 7, 0], [7, 7, 7], [0, 0, 0]];
            if (type === 'B') return [[0, 8, 0], [8, 8, 8], [0, 8, 0]]; // 십자형 폭탄
        }

        function createMatrix(w, h) {
            const matrix = [];
            while (h--) { matrix.push(new Array(w).fill(0)); }
            return matrix;
        }

        // [핵심 추가] 줄 제거 시 반짝임 효과를 위한 변수
        let linesToClear = [];
        let clearAnimCounter = 0;

        function draw() {
            // 배경 그리기
            context.fillStyle = 'rgba(0,0,0,0.5)';
            context.fillRect(0, 0, canvas.width, canvas.height);

            drawMatrix(arena, { x: 0, y: 0 }, context);

            // [핵심 추가] 줄 제거 반짝임 효과 그리기
            if (linesToClear.length > 0) {
                context.fillStyle = 'white'; // 하얗게 반짝임
                linesToClear.forEach(y => {
                    context.fillRect(0, y, arena[0].length, 1);
                });
                clearAnimCounter++;
                if (clearAnimCounter > 10) { // 약 0.2초간 반짝임
                    clearAnim(); // 애니메이션 종료 후 실제 줄 제거
                }
            } else {
                drawGhost();
                if (player.matrix) drawMatrix(player.matrix, player.pos, context);
            }

            // [핵심 수정] 미리보기 그리기 (가운데 정렬 최적화)
            nextContext.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
            if (nextPiece) {
                // 도형 크기에 따라 가운데 정렬 오프셋 조정
                const offset = { x: 0, y: 0 };
                if (nextPiece.length === 4) offset.x = 0, offset.y = 0; // I자
                else if (nextPiece.length === 3) offset.x = 0.5, offset.y = 0.5; // T, L, J, S, Z, B자
                else offset.x = 1, offset.y = 1; // O자

                drawMatrix(nextPiece, offset, nextContext);
            }
        }

        function drawMatrix(matrix, offset, ctx) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        ctx.fillStyle = colors[value];
                        // 젤리 느낌의 둥근 사각형
                        ctx.fillRect(x + offset.x + 0.05, y + offset.y + 0.05, 0.9, 0.9);
                        if (value === 8) { // 폭탄 눈 그리기 👀
                            ctx.fillStyle = "white";
                            ctx.fillRect(x + offset.x + 0.2, y + offset.y + 0.3, 0.2, 0.2);
                            ctx.fillRect(x + offset.x + 0.6, y + offset.y + 0.3, 0.2, 0.2);
                        }
                    }
                });
            });
        }

        function drawGhost() {
            if (!player.matrix) return;
            const ghostPos = { x: player.pos.x, y: player.pos.y };
            while (!collide(arena, { pos: ghostPos, matrix: player.matrix })) { ghostPos.y++; }
            ghostPos.y--;
            context.strokeStyle = 'rgba(255, 255, 255, 0.2)';
            context.lineWidth = 0.05;
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) context.strokeRect(x + ghostPos.x, y + ghostPos.y, 1, 1);
                });
            });
        }

        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) return true;
                }
            }
            return false;
        }

        // 세로 3줄 폭발 로직 💣
        function explode(player) {
            const x = player.pos.x + 1; // 폭탄 중심
            for (let i = x - 1; i <= x + 1; i++) { // 좌우 한 줄씩
                if (i >= 0 && i < arena[0].length) {
                    for (let j = 0; j < arena.length; j++) { // 바닥까지
                        arena[j][i] = 0;
                    }
                }
            }
            // 폭발 이펙트 (간단하게 흰색 반짝임)
            context.fillStyle = "white";
            context.fillRect(x - 1, 0, 3, arena.length);
        }

        function merge(arena, player) {
            if (player.matrix.length === 3 && player.matrix[1][1] === 8) {
                explode(player);
                return;
            }
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) arena[y + player.pos.y][x + player.pos.x] = value;
                });
            });
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) { [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]]; }
            }
            if (dir > 0) matrix.forEach(row => row.reverse());
            else matrix.reverse();
        }

        function playerDrop() {
            if (!gameRunning || linesToClear.length > 0) return; // 줄 제거 애니메이션 중엔 드롭 중지
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                arenaSweep(); // 줄 체크 및 애니메이션 시작
                if (linesToClear.length === 0) {
                    playerReset();
                }
            }
            dropCounter = 0;
        }

        function playerHardDrop() {
            if (!gameRunning || linesToClear.length > 0) return;
            while (!collide(arena, player)) { player.pos.y++; }
            player.pos.y--;
            merge(arena, player);
            arenaSweep();
            if (linesToClear.length === 0) {
                playerReset();
            }
        }

        function playerMove(dir) {
            if (!gameRunning || linesToClear.length > 0) return;
            player.pos.x += dir;
            if (collide(arena, player)) player.pos.x -= dir;
        }

        function playerRotate(dir) {
            if (!gameRunning || linesToClear.length > 0) return;
            // 폭탄은 회전 안 함
            if (player.matrix.length === 3 && player.matrix[1][1] === 8) return;

            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
        }

        // [핵심 수정] 줄 제거 체크 및 애니메이션 시작
        function arenaSweep() {
            let rowCount = 0;
            for (let y = arena.length - 1; y > 0; --y) {
                let isFull = true;
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) {
                        isFull = false;
                        break;
                    }
                }
                if (isFull) {
                    linesToClear.push(y);
                    rowCount++;
                }
            }
            if (rowCount > 0) {
                clearAnimCounter = 0; // 애니메이션 카운터 초기화
                player.score += rowCount * 10 * player.level;
                player.lines += rowCount;
                if (player.lines >= 5) { // 5줄마다 레벨업
                    player.level++;
                    player.lines = 0;
                    dropInterval *= 0.9;
                }
                updateScore();
            }
        }

        // [핵심 추가] 줄 제거 애니메이션 종료 후 실제 제거 로직
        function clearAnim() {
            linesToClear.forEach(y => {
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
            });
            linesToClear = []; // 애니메이션 종료
            playerReset(); // 새 블록 소환
        }

        let nextPiece = null;
        function playerReset() {
            const pieces = 'ILJOTSZ';
            const bombChance = Math.max(0.02, 0.12 - (player.level * 0.02));

            if (nextPiece === null) {
                nextPiece = createPiece(pieces[pieces.length * Math.random() | 0]);
            }

            player.matrix = nextPiece;
            // 다음 블록 미리 생성
            if (Math.random() < bombChance) {
                nextPiece = createPiece('B');
            } else {
                nextPiece = createPiece(pieces[pieces.length * Math.random() | 0]);
            }

            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);

            if (collide(arena, player)) {
                gameRunning = false;
                document.getElementById('msg').innerText = "GAME OVER";
                document.getElementById('final-score').innerText = player.score;
                document.getElementById('final-score-txt').style.display = "block";
                document.getElementById('overlay').style.display = 'flex';
            }
        }

        function updateScore() {
            document.getElementById('score').innerText = player.score;
            document.getElementById('level').innerText = player.level;
        }

        function startGame() {
            document.getElementById('overlay').style.display = 'none';
            arena.forEach(row => row.fill(0));
            player.score = 0; player.level = 1; player.lines = 0; dropInterval = 1000;
            nextPiece = null;
            linesToClear = []; // 애니메이션 초기화
            updateScore();
            playerReset();
            gameRunning = true;
        }

        const arena = createMatrix(10, 20);
        const player = { pos: { x: 0, y: 0 }, matrix: null, score: 0, level: 1, lines: 0 };
        let dropCounter = 0, dropInterval = 1000, lastTime = 0, gameRunning = false;

        function update(time = 0) {
            const deltaTime = time - lastTime;
            lastTime = time;
            if (gameRunning) {
                dropCounter += deltaTime;
                if (dropCounter > dropInterval) playerDrop();
            }
            draw();
            requestAnimationFrame(update);
        }
        update();
    </script>
</body>

</html>
