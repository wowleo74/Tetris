<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>레오의 딸들을 위한 테트리스 - NEXT 완벽 정렬</title>
    <style>
        :root {
            --bg-color: #2c3e50;
            --panel-color: rgba(255, 255, 255, 0.1);
        }

        body {
            background: var(--bg-color);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 0;
            font-family: 'Apple SD Gothic Neo', sans-serif;
            height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* 상단 UI: 3분할 레이아웃 */
        .header {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            width: 95%;
            max-width: 340px;
            padding: 8px 0;
            z-index: 10;
            gap: 4px;
        }

        .info-box {
            background: var(--panel-color);
            padding: 5px;
            border-radius: 12px;
            font-size: 12px;
            text-align: center;
        }

        .info-label {
            font-size: 9px;
            color: #bdc3c7;
            display: block;
            margin-bottom: 2px;
        }

        .info-value {
            font-size: 20px;
            font-weight: bold;
            color: #fff;
        }

        /* 미리보기 박스 스타일 */
        .next-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* [미세 조정] 미리보기 캔버스 내부 여백을 위해 스타일 크기 살짝 축소 */
        canvas#next {
            width: 32px;
            height: 32px;
        }

        /* 게임 메인 컨테이너 */
        .game-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 게임화면 세로 확대 (68vh) */
        canvas#tetris {
            border: 4px solid #fff;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.5);
            height: 68vh;
            aspect-ratio: 1 / 2;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        /* 오버레이 화면 */
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(44, 62, 80, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            border-radius: 10px;
        }

        .btn-start {
            padding: 10px 25px;
            font-size: 18px;
            font-weight: bold;
            background: #ff7675;
            color: #fff;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 4px #d63031;
        }

        .btn-start:active {
            transform: translateY(3px);
            box-shadow: 0 1px #d63031;
        }

        /* 아래 조작바 슬림화 */
        .controls {
            display: flex;
            gap: 8px;
            padding: 10px 0;
        }

        .btn {
            width: 48px;
            height: 48px;
            background: #fab1a0;
            border-radius: 50%;
            border: none;
            font-size: 20px;
            color: #fff;
            box-shadow: 0 3px #e17055;
        }

        .btn:active {
            transform: scale(0.9);
            box-shadow: 0 1px #e17055;
        }

        .btn-hard {
            width: 75px;
            border-radius: 16px;
            background: #74b9ff;
            box-shadow: 0 3px #0984e3;
            font-size: 11px;
            padding: 0 5px;
        }
    </style>
</head>

<body>

    <div class="header">
        <div class="info-box"><span class="info-label">SCORE</span><span id="score" class="info-value">0</span></div>
        <div class="info-box next-box">
            <span class="info-label">NEXT</span>
            <canvas id="next" width="80" height="80"></canvas>
        </div>
        <div class="info-box"><span class="info-label">LEVEL</span><span id="level" class="info-value">1</span></div>
    </div>

    <div class="game-wrapper">
        <canvas id="tetris" width="200" height="400"></canvas>

        <div id="overlay">
            <h1 id="msg" style="margin-bottom: 5px; font-size: 24px;">READY?</h1>
            <p id="final-score-txt" style="display:none; margin-bottom: 15px; font-size: 14px;">Score: <span
                    id="final-score">0</span></p>
            <button class="btn-start" onclick="startGame()">START!</button>
        </div>
    </div>

    <div class="controls">
        <button class="btn" onclick="playerMove(-1)">◀</button>
        <button class="btn" onclick="playerDrop()">▼</button>
        <button class="btn" onclick="playerRotate(1)">↻</button>
        <button class="btn" onclick="playerMove(1)">▶</button>
        <button class="btn btn-hard" onclick="playerHardDrop()">BOMB!<br>DROP</button>
    </div>

    <script>
        // 폭발 소리 생성기
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playExplosionSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);
        }

        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const nextCanvas = document.getElementById('next');
        const nextContext = nextCanvas.getContext('2d');

        context.scale(20, 20);
        nextContext.scale(20, 20); // 1칸 = 20px

        // 귀여운 파스텔 컬러 (8번은 폭탄)
        const colors = [null, '#ff7675', '#74b9ff', '#55efc4', '#ffe138', '#fab1a0', '#a29bfe', '#fd79a8', '#ff3333'];

        function createPiece(type) {
            if (type === 'I') return [[0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0]];
            if (type === 'L') return [[0, 2, 0], [0, 2, 0], [0, 2, 2]];
            if (type === 'J') return [[0, 3, 0], [0, 3, 0], [3, 3, 0]];
            if (type === 'O') return [[4, 4], [4, 4]];
            if (type === 'Z') return [[5, 5, 0], [0, 5, 5], [0, 0, 0]];
            if (type === 'S') return [[0, 6, 6], [6, 6, 0], [0, 0, 0]];
            if (type === 'T') return [[0, 7, 0], [7, 7, 7], [0, 0, 0]];
            // 진짜 폭탄 모양 (3x3 십자형)
            if (type === 'B') return [[0, 8, 0], [8, 8, 8], [0, 8, 0]];
        }

        function createMatrix(w, h) {
            const matrix = [];
            while (h--) { matrix.push(new Array(w).fill(0)); }
            return matrix;
        }

        // [핵심 수정] 미리보기 완벽 중앙 정렬 로직
        function drawNextPiece() {
            nextContext.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
            if (!nextPiece) return;

            // 1. 블록의 실제 가로/세로 칸 수 계산
            let maxW = 0, maxH = 0;
            nextPiece.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        maxW = Math.max(maxW, x + 1);
                        maxH = Math.max(maxH, y + 1);
                    }
                });
            });

            // 2. 캔버스 논리 크기 (칸 수) 계산 (80px / 20px = 4칸)
            const canvasW = nextCanvas.width / 20;
            const canvasH = nextCanvas.height / 20;

            // 3. 완벽한 중앙 좌표 계산 (블록 크기의 절반을 캔버스 중앙에서 뺌)
            const offsetX = (canvasW - maxW) / 2;
            const offsetY = (canvasH - maxH) / 2;

            // 4. 그리기
            drawMatrix(nextPiece, { x: offsetX, y: offsetY }, nextContext);
        }

        function draw() {
            // 배경 그리기
            context.fillStyle = 'rgba(0,0,0,0.5)';
            context.fillRect(0, 0, canvas.width, canvas.height);

            drawMatrix(arena, { x: 0, y: 0 }, context);
            drawGhost();
            if (player.matrix) drawMatrix(player.matrix, player.pos, context);

            // 미리보기 그리기
            drawNextPiece();
        }

        function drawMatrix(matrix, offset, ctx) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        ctx.fillStyle = colors[value];
                        // 젤리 느낌의 둥근 사각형
                        ctx.fillRect(x + offset.x + 0.05, y + offset.y + 0.05, 0.9, 0.9);

                        // 폭탄 비주얼 강화
                        if (value === 8) {
                            // 심지 그리기
                            ctx.fillStyle = "#8e44ad";
                            ctx.fillRect(x + offset.x + 0.45, y + offset.y - 0.2, 0.1, 0.2);
                            // 불꽃
                            ctx.fillStyle = Math.random() > 0.5 ? "#ff9f43" : "#ee5253";
                            ctx.fillRect(x + offset.x + 0.4, y + offset.y - 0.3, 0.2, 0.2);

                            // 폭탄 눈 그리기
                            ctx.fillStyle = "white";
                            ctx.fillRect(x + offset.x + 0.2, y + offset.y + 0.3, 0.2, 0.2);
                            ctx.fillRect(x + offset.x + 0.6, y + offset.y + 0.3, 0.2, 0.2);
                        }
                    }
                });
            });
        }

        function drawGhost() {
            if (!player.matrix) return;
            const ghostPos = { x: player.pos.x, y: player.pos.y };
            while (!collide(arena, { pos: ghostPos, matrix: player.matrix })) { ghostPos.y++; }
            ghostPos.y--;
            context.strokeStyle = 'rgba(255, 255, 255, 0.2)';
            context.lineWidth = 0.05;
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) context.strokeRect(x + ghostPos.x, y + ghostPos.y, 1, 1);
                });
            });
        }

        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) return true;
                }
            }
            return false;
        }

        // 세로 3줄 폭발 로직 💣
        function explode(player) {
            const x = player.pos.x + 1;
            for (let i = x - 1; i <= x + 1; i++) {
                if (i >= 0 && i < arena[0].length) {
                    for (let j = 0; j < arena.length; j++) {
                        arena[j][i] = 0;
                    }
                }
            }
            playExplosionSound();
            context.fillStyle = "white";
            context.fillRect(x - 1, 0, 3, arena.length);
        }

        function merge(arena, player) {
            if (player.matrix.length === 3 && player.matrix[1][1] === 8) {
                explode(player);
                return;
            }
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) arena[y + player.pos.y][x + player.pos.x] = value;
                });
            });
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) { [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]]; }
            }
            if (dir > 0) matrix.forEach(row => row.reverse());
            else matrix.reverse();
        }

        function playerDrop() {
            if (!gameRunning) return;
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
            }
            dropCounter = 0;
        }

        function playerHardDrop() {
            if (!gameRunning) return;
            while (!collide(arena, player)) { player.pos.y++; }
            player.pos.y--;
            merge(arena, player);
            playerReset();
            arenaSweep();
        }

        function playerMove(dir) {
            if (!gameRunning) return;
            player.pos.x += dir;
            if (collide(arena, player)) player.pos.x -= dir;
        }

        function playerRotate(dir) {
            if (!gameRunning) return;
            if (player.matrix.length === 3 && player.matrix[1][1] === 8) return;

            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
        }

        function arenaSweep() {
            let rowCount = 0;
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) { if (arena[y][x] === 0) continue outer; }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;
                rowCount++;
            }
            if (rowCount > 0) {
                player.score += rowCount * 10 * player.level;
                player.lines += rowCount;
                if (player.lines >= 5) {
                    player.level++;
                    player.lines = 0;
                    dropInterval *= 0.9;
                }
                updateScore();
            }
        }

        let nextPiece = null;
        function playerReset() {
            const pieces = 'ILJOTSZ';
            const bombChance = Math.max(0.02, 0.12 - (player.level * 0.02));

            if (nextPiece === null) {
                nextPiece = createPiece(pieces[pieces.length * Math.random() | 0]);
            }

            player.matrix = nextPiece;
            if (Math.random() < bombChance) {
                nextPiece = createPiece('B');
            } else {
                nextPiece = createPiece(pieces[pieces.length * Math.random() | 0]);
            }

            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);

            if (collide(arena, player)) {
                gameRunning = false;
                document.getElementById('msg').innerText = "GAME OVER";
                document.getElementById('final-score').innerText = player.score;
                document.getElementById('final-score-txt').style.display = "block";
                document.getElementById('overlay').style.display = 'flex';
            }
        }

        function updateScore() {
            document.getElementById('score').innerText = player.score;
            document.getElementById('level').innerText = player.level;
        }

        function startGame() {
            document.getElementById('overlay').style.display = 'none';
            arena.forEach(row => row.fill(0));
            player.score = 0; player.level = 1; player.lines = 0; dropInterval = 1000;
            nextPiece = null;
            updateScore();
            playerReset();
            gameRunning = true;
        }

        const arena = createMatrix(10, 20);
        const player = { pos: { x: 0, y: 0 }, matrix: null, score: 0, level: 1, lines: 0 };
        let dropCounter = 0, dropInterval = 1000, lastTime = 0, gameRunning = false;

        function update(time = 0) {
            const deltaTime = time - lastTime;
            lastTime = time;
            if (gameRunning) {
                dropCounter += deltaTime;
                if (dropCounter > dropInterval) playerDrop();
            }
            draw();
            requestAnimationFrame(update);
        }
        update();
    </script>
</body>

</html>
